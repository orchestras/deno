# mise.toml — project tool versions and tasks
# Docs: https://mise.jdx.dev/
# Run `mise tasks` for a full list of available tasks with descriptions.
# Run `mise run <task>` to execute a task.

[tools]
deno = "2.0.2"
node = "22"

[env]
DENO_DIR = "{{config_root}}/.deno-cache"

# ─── Core ────────────────────────────────────────────────────────────────────

[tasks.run]
description = "Run the Deno application"
run = "deno run --allow-all ./src/mod.ts"

[tasks.check]
description = "Type-check the Deno source"
run = "deno check ./src/mod.ts"

[tasks.lint]
description = "Lint the source code"
run = "deno lint"

[tasks.fmt]
description = "Format the source code"
run = "deno fmt"

[tasks."fmt:check"]
description = "Check formatting without writing"
run = "deno fmt --check"

[tasks.test]
description = "Run the test suite"
run = "deno test -A"

# ─── Version management ─────────────────────────────────────────────────────

[tasks.version]
description = "Show current version from deno.json"
run = """
#!/usr/bin/env bash
version=$(jq -r '.version' deno.json)
echo "Current version: $version"
"""

[tasks."version:set"]
description = "Sync version from latest git tag into deno.json and regenerate version.ts"
run = """
#!/usr/bin/env bash
set -euo pipefail
tag=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
if [ -z "$tag" ]; then
  echo "No version tags found — initialising at v0.1.0"
  tag="v0.1.0"
fi
tmp=$(mktemp)
jq --arg v "$tag" '.version = $v' deno.json > "$tmp" && mv "$tmp" deno.json
deno run --allow-all src/make_version.ts
echo "Version set to $tag"
"""

[tasks."version:init"]
description = "Create initial v0.1.0 tag if no version tags exist"
run = """
#!/usr/bin/env bash
set -euo pipefail
existing=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
if [ -n "$existing" ]; then
  echo "Tags already exist (latest: $existing). Skipping init."
  exit 0
fi
git tag -a v0.1.0 -m "v0.1.0 — initial version"
echo "Created initial tag v0.1.0"
"""

# ─── Bump commands ──────────────────────────────────────────────────────────
# These update deno.json + version.ts but do NOT create or push git tags.
# Use `mise run tag:create` + `mise run tag:push` separately after all
# commits are pushed.

[tasks."bump:build"]
description = "Bump build metadata (random build number)"
run = """
#!/usr/bin/env bash
set -euo pipefail

current=$(jq -r '.version' deno.json | sed 's/^v//')
base=$(echo "$current" | cut -d'+' -f1)
build_num=$(shuf -i 10000-99999 -n 1)
new_version="v${base}+${build_num}"

tmp=$(mktemp)
jq --arg v "$new_version" '.version = $v' deno.json > "$tmp" && mv "$tmp" deno.json
deno run --allow-all src/make_version.ts

echo "Bumped to $new_version"
"""

[tasks."bump:patch"]
description = "Bump patch version (e.g. 0.1.0 → 0.1.1)"
run = """
#!/usr/bin/env bash
set -euo pipefail

current=$(jq -r '.version' deno.json | sed 's/^v//')
base=$(echo "$current" | cut -d'+' -f1 | cut -d'-' -f1)
IFS='.' read -r major minor patch <<< "$base"
patch=$((patch + 1))
new_version="v${major}.${minor}.${patch}"

tmp=$(mktemp)
jq --arg v "$new_version" '.version = $v' deno.json > "$tmp" && mv "$tmp" deno.json
deno run --allow-all src/make_version.ts

echo "Bumped to $new_version"
"""

[tasks."bump:minor"]
description = "Bump minor version (e.g. 0.1.0 → 0.2.0)"
run = """
#!/usr/bin/env bash
set -euo pipefail

current=$(jq -r '.version' deno.json | sed 's/^v//')
base=$(echo "$current" | cut -d'+' -f1 | cut -d'-' -f1)
IFS='.' read -r major minor patch <<< "$base"
minor=$((minor + 1))
new_version="v${major}.${minor}.0"

tmp=$(mktemp)
jq --arg v "$new_version" '.version = $v' deno.json > "$tmp" && mv "$tmp" deno.json
deno run --allow-all src/make_version.ts

echo "Bumped to $new_version"
"""

[tasks."bump:major"]
description = "Bump major version (e.g. 0.1.0 → 1.0.0)"
run = """
#!/usr/bin/env bash
set -euo pipefail

current=$(jq -r '.version' deno.json | sed 's/^v//')
base=$(echo "$current" | cut -d'+' -f1 | cut -d'-' -f1)
IFS='.' read -r major minor patch <<< "$base"
major=$((major + 1))
new_version="v${major}.0.0"

tmp=$(mktemp)
jq --arg v "$new_version" '.version = $v' deno.json > "$tmp" && mv "$tmp" deno.json
deno run --allow-all src/make_version.ts

echo "Bumped to $new_version"
"""

# ─── Tagging (always done after all commits are pushed) ─────────────────────

[tasks."tag:create"]
description = "Create a git tag from the current deno.json version"
run = """
#!/usr/bin/env bash
set -euo pipefail
version=$(jq -r '.version' deno.json)
echo "Creating tag: $version"
git tag -a "$version" -m "$version"
echo "Tag $version created locally. Run 'mise run tag:push' to push."
"""

[tasks."tag:push"]
description = "Push all tags to origin"
run = "git push origin --tags"

[tasks."tag:list"]
description = "List all version tags"
run = "git tag -l 'v*' --sort=-v:refname"

# ─── VCS workflow (linear rebase model) ─────────────────────────────────────
# VCS promotion: feature/* → develop (via PR rebase) → main (linear rebase)
# This is separate from Artifactory promotion (dev → uat → prod).

[tasks."vcs:promote"]
description = "Promote develop → main (linear rebase fast-forward)"
run = """
#!/usr/bin/env bash
set -euo pipefail

current_branch=$(git branch --show-current)

echo "Fetching latest from origin..."
git fetch origin

echo "Checking out main..."
git checkout main
git pull origin main --rebase

echo "Merging develop into main (fast-forward only)..."
git merge --ff-only origin/develop || {
  echo ""
  echo "Fast-forward not possible. Rebasing develop onto main first..."
  git checkout develop
  git rebase main
  git push origin develop --force-with-lease
  git checkout main
  git merge --ff-only develop
}

git push origin main
echo "✓ develop promoted to main via fast-forward"

git checkout "$current_branch"
"""

[tasks."vcs:rebase"]
description = "Rebase current branch onto develop"
run = """
#!/usr/bin/env bash
set -euo pipefail
git fetch origin
git rebase origin/develop
echo "✓ Rebased onto develop"
"""

[tasks."vcs:set-default-branch"]
description = "Set develop as the default branch on GitHub (uses gh CLI, token in-memory only)"
run = """
#!/usr/bin/env bash
set -euo pipefail

# Verify gh is authenticated
if ! gh auth status &>/dev/null; then
  echo "ERROR: gh CLI is not authenticated. Run: gh auth login"
  exit 1
fi

REPO=$(gh repo view --json nameWithOwner -q '.nameWithOwner')
echo "Repository: $REPO"

# Check if develop branch exists on remote
if ! git ls-remote --heads origin develop | grep -q develop; then
  echo "Creating develop branch from main..."
  git checkout main
  git pull origin main
  git checkout -b develop
  git push -u origin develop
fi

# Set default branch via GitHub API (token from gh, never stored to disk)
gh api -X PATCH "repos/${REPO}" \
  -f default_branch=develop \
  --silent

echo "✓ Default branch set to 'develop' for $REPO"

# Add branch protection for develop (mirrors main protection)
gh api -X PUT "repos/${REPO}/branches/develop/protection" \
  --input - <<'EOF'
{
  "required_status_checks": {
    "strict": true,
    "contexts": []
  },
  "enforce_admins": false,
  "required_pull_request_reviews": {
    "required_approving_review_count": 1
  },
  "restrictions": null,
  "allow_force_pushes": false,
  "allow_deletions": false
}
EOF

echo "✓ Branch protection applied to develop"
"""

# ─── Build ───────────────────────────────────────────────────────────────────

[tasks.build]
description = "Build version.ts from deno.json version"
run = "deno run --allow-all src/make_version.ts"

[tasks.compile]
description = "Compile cross-platform binaries"
run = """
#!/usr/bin/env bash
set -euo pipefail
mkdir -p bin
deno compile --allow-all --no-check --target aarch64-apple-darwin --output ./bin/aarch64-apple-darwin/mod ./src/mod.ts
deno compile --allow-all --no-check --target x86_64-apple-darwin --output ./bin/x86_64-apple-darwin/mod ./src/mod.ts
deno compile --allow-all --no-check --target x86_64-unknown-linux-gnu --output ./bin/x86_64-unknown-linux-gnu/mod ./src/mod.ts
deno compile --allow-all --no-check --target aarch64-unknown-linux-gnu --output ./bin/aarch64-unknown-linux-gnu/mod ./src/mod.ts
echo "✓ Binaries compiled to ./bin/"
"""

# ─── NPM / Artifactory registry ─────────────────────────────────────────────

[tasks."npm:set-registry"]
description = "Set NPM registry to Artifactory (requires ARTIFACTORY_USER + ARTIFACTORY_KEY env vars)"
run = """
#!/usr/bin/env bash
set -euo pipefail

source ./scripts/resolve_secrets.sh 2>/dev/null || true

RT_URL="" RT_USER="" RT_KEY=""

# Try Conjur first
if [ -n "${CONJUR_API_KEY:-}" ]; then
  RT_URL=$(resolve_single_secret "artifactory/npm_url" conjur 2>/dev/null) || true
  RT_USER=$(resolve_single_secret "artifactory/user" conjur 2>/dev/null) || true
  RT_KEY=$(resolve_single_secret "artifactory/api_key" conjur 2>/dev/null) || true
fi

RT_URL="${RT_URL:-${ARTIFACTORY_NPM_URL:-}}"
RT_USER="${RT_USER:-${ARTIFACTORY_USER:-}}"
RT_KEY="${RT_KEY:-${ARTIFACTORY_KEY:-}}"

if [ -z "$RT_URL" ] || [ -z "$RT_USER" ] || [ -z "$RT_KEY" ]; then
  echo "ERROR: Set ARTIFACTORY_NPM_URL, ARTIFACTORY_USER, and ARTIFACTORY_KEY env vars"
  echo "  or configure Conjur (CONJUR_API_KEY, CONJUR_URL, CONJUR_SAFE)"
  exit 1
fi

# Configure npm to use Artifactory
npm config set registry "$RT_URL"

# Set auth — Artifactory uses _auth = base64(user:key)
AUTH=$(echo -n "${RT_USER}:${RT_KEY}" | base64)
REGISTRY_HOST=$(echo "$RT_URL" | sed 's|https\\?://||')
npm config set "//${REGISTRY_HOST}:_auth" "$AUTH"

echo "✓ NPM registry set to $RT_URL"
echo "  (credentials stored in ~/.npmrc, not in repo)"
"""

[tasks."npm:reset-registry"]
description = "Reset NPM registry to default (npmjs.org)"
run = """
#!/usr/bin/env bash
npm config set registry https://registry.npmjs.org/
echo "✓ NPM registry reset to https://registry.npmjs.org/"
"""

# ─── Secrets & Transcrypt ───────────────────────────────────────────────────

[tasks."secrets:init"]
description = "Bootstrap transcrypt: auto-configure from repo secret or create new"
run = """
#!/usr/bin/env bash
set -euo pipefail
source ./scripts/transcrypt_bootstrap.sh
transcrypt_bootstrap
"""

[tasks."secrets:resolve"]
description = "Resolve secrets: Conjur (if CONJUR_API_KEY exists) → fallback to env vars/inputs"
run = """
#!/usr/bin/env bash
set -euo pipefail
source ./scripts/resolve_secrets.sh
resolve_secrets "$@"
"""

# ─── Setup & Init ───────────────────────────────────────────────────────────

[tasks.init]
description = "Full project initialisation (install deps, bootstrap secrets, set version)"
depends = ["secrets:init", "version:init", "version:set"]
run = """
#!/usr/bin/env bash
echo ""
echo "✓ Project initialised. Run 'mise tasks' to see available tasks."
"""

[tasks.setup]
description = "Install mise shell completions for bash, zsh, and fish"
run = """
#!/usr/bin/env bash
set -euo pipefail

echo "Installing mise shell completions..."

# Bash
mkdir -p ~/.local/share/bash-completion/completions
mise completion bash > ~/.local/share/bash-completion/completions/mise 2>/dev/null && \
  echo "  ✓ bash" || echo "  ⚠ bash (skipped)"

# Zsh
mkdir -p ~/.zsh/completions
mise completion zsh > ~/.zsh/completions/_mise 2>/dev/null && \
  echo "  ✓ zsh" || echo "  ⚠ zsh (skipped)"

# Fish
if command -v fish &>/dev/null; then
  fish_dir="${XDG_CONFIG_HOME:-$HOME/.config}/fish/completions"
  mkdir -p "$fish_dir"
  mise completion fish > "$fish_dir/mise.fish" && \
    echo "  ✓ fish" || echo "  ⚠ fish (skipped)"
else
  echo "  ⚠ fish not installed, skipping"
fi

echo ""
echo "Restart your shell or 'source ~/.bashrc' to activate."
"""

[tasks.help]
description = "Show all available tasks with descriptions"
run = """
#!/usr/bin/env bash
echo ""
echo "Available tasks (run with: mise run <task>):"
echo "─────────────────────────────────────────────"
mise tasks 2>/dev/null || echo "Run 'mise tasks' for task list"
echo ""
echo "Tip: 'mise run <task>' to execute, 'mise completion <shell>' for completions"
"""

# ─── CI helpers ──────────────────────────────────────────────────────────────

[tasks."ci:lint"]
description = "CI lint check"
run = "deno lint"

[tasks."ci:check"]
description = "CI type check"
run = "deno check ./src/mod.ts"

[tasks."ci:test"]
description = "CI test run"
run = "deno test -A"

[tasks."ci:all"]
description = "Run all CI checks (lint + check + test + build + run)"
depends = ["lint", "check", "test", "build", "run"]

# ─── Docker ──────────────────────────────────────────────────────────────────

[tasks."docker:build"]
description = "Build the release Docker image"
run = """
#!/usr/bin/env bash
set -euo pipefail
version=$(jq -r '.version' deno.json)
docker buildx bake package --set "package.args.TAG=$version"
"""

[tasks."docker:push"]
description = "Push Docker image to registry"
run = """
#!/usr/bin/env bash
set -euo pipefail
version=$(jq -r '.version' deno.json)
repo="${DOCKER_REPO:-lynsei}"
program="${DOCKER_PROGRAM:-orchestras}"
docker push "${repo}/${program}:${version}"
"""
