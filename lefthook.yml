# Lefthook configuration — https://lefthook.dev/configuration/
# Uses mise tasks instead of make targets.

pre-push:
  parallel: false
  jobs:
    - name: "Lint"
      tags: [quality]
      run: mise run lint
    - name: "Check"
      tags: [quality]
      run: mise run check
    - name: "Run"
      tags: [quality]
      run: mise run run

pre-commit:
  parallel: false
  jobs:
    - name: "Lint"
      tags: [quality]
      run: mise run lint
    - name: "Run"
      tags: [quality]
      run: mise run run
