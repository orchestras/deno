name: Build and Release Deno Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-amd64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-amd64
            ext: .exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Ensure version.ts matches deno.json
        run: mise run build

      - name: Compile Binary
        run: |
          deno compile --allow-all --no-check \
            --target=${{ matrix.target }} \
            --output mod-${{ matrix.suffix }}${{ matrix.ext }} \
            ./src/mod.ts

      - name: Generate Checksum
        shell: bash
        run: |
          if command -v shasum &>/dev/null; then
            shasum -a 256 mod-${{ matrix.suffix }}* > mod-${{ matrix.suffix }}.sha256
          else
            sha256sum mod-${{ matrix.suffix }}* > mod-${{ matrix.suffix }}.sha256
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: |
            mod-${{ matrix.suffix }}*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Read Release Notes
        id: notes
        run: |
          if [ -f release-notes.md ]; then
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            cat release-notes.md >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: artifacts/**/*
          draft: false
          prerelease: false
