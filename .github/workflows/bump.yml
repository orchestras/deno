name: Version Bump & Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Determine Version Bump
        id: version_bump
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "#major"
          minor_pattern: "#minor"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: true
          bump_each_commit_patch_pattern: "#patch"

      - name: Update deno.json version
        run: |
          NEW_VERSION="v${{ steps.version_bump.outputs.version }}"
          echo "Setting version to: $NEW_VERSION"
          tmp=$(mktemp)
          jq --arg v "$NEW_VERSION" '.version = $v' deno.json > "$tmp" && mv "$tmp" deno.json
          mise run build

      - name: Push Tag
        run: |
          RELEASE_TAG="${{ steps.version_bump.outputs.version_tag }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Only tag if this tag doesn't already exist
          if ! git tag -l | grep -q "^${RELEASE_TAG}$"; then
            git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
            echo "✓ Pushed tag: $RELEASE_TAG"
          else
            echo "Tag $RELEASE_TAG already exists, skipping."
          fi
