name: "Artifactory: Promote Docker Image"

# Copies a Docker image between Artifactory Docker repositories.
# Promotion is always a COPY (not move) and must follow:
#   docker-dev → docker-uat → docker-prod  (no skipping stages)
#
# Uses JFrog CLI `jf rt docker-promote` to copy images within
# Artifactory without pulling/pushing through the Docker daemon.

on:
  workflow_dispatch:
    inputs:
      promotion:
        description: "Promotion stage"
        required: true
        type: choice
        options:
          - dev-to-uat
          - uat-to-prod
      image_name:
        description: "Docker image name (e.g. orchestras/mod)"
        required: true
      image_tag:
        description: "Image tag to promote"
        required: true
      source_repo:
        description: "Override source Docker repo (default auto-set)"
        required: false
      target_repo:
        description: "Override target Docker repo (default auto-set)"
        required: false
      artifactory_url:
        description: "Artifactory base URL (fallback if not in Conjur)"
        required: false
      artifactory_user:
        description: "Artifactory user (fallback if not in Conjur)"
        required: false
      artifactory_key:
        description: "Artifactory API key (fallback if not in Conjur)"
        required: false

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      CONJUR_API_KEY: ${{ secrets.CONJUR_API_KEY }}
      CONJUR_URL: ${{ vars.CONJUR_URL }}
      CONJUR_SAFE: ${{ vars.CONJUR_SAFE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine source and target repos
        id: repos
        run: |
          case "${{ inputs.promotion }}" in
            dev-to-uat)
              SRC="${{ inputs.source_repo }}"
              TGT="${{ inputs.target_repo }}"
              echo "source=${SRC:-docker-dev-local}" >> "$GITHUB_OUTPUT"
              echo "target=${TGT:-docker-uat-local}" >> "$GITHUB_OUTPUT"
              ;;
            uat-to-prod)
              SRC="${{ inputs.source_repo }}"
              TGT="${{ inputs.target_repo }}"
              echo "source=${SRC:-docker-uat-local}" >> "$GITHUB_OUTPUT"
              echo "target=${TGT:-docker-prod-local}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Resolve Artifactory credentials
        id: creds
        run: |
          source ./scripts/resolve_secrets.sh

          RT_URL="" RT_USER="" RT_KEY=""

          if [ -n "${CONJUR_API_KEY:-}" ]; then
            echo "Resolving credentials from Conjur..."
            RT_URL=$(resolve_single_secret "artifactory/url" conjur 2>/dev/null) || true
            RT_USER=$(resolve_single_secret "artifactory/user" conjur 2>/dev/null) || true
            RT_KEY=$(resolve_single_secret "artifactory/api_key" conjur 2>/dev/null) || true
          fi

          RT_URL="${RT_URL:-${{ inputs.artifactory_url }}}"
          RT_USER="${RT_USER:-${{ inputs.artifactory_user }}}"
          RT_KEY="${RT_KEY:-${{ inputs.artifactory_key }}}"

          if [ -z "$RT_URL" ] || [ -z "$RT_USER" ] || [ -z "$RT_KEY" ]; then
            echo "::error::Could not resolve Artifactory credentials."
            exit 1
          fi

          echo "rt_url=$RT_URL" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$RT_USER"
          echo "::add-mask::$RT_KEY"
          echo "rt_user=$RT_USER" >> "$GITHUB_OUTPUT"
          echo "rt_key=$RT_KEY" >> "$GITHUB_OUTPUT"

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      - name: Promote Docker image within Artifactory
        env:
          RT_URL: ${{ steps.creds.outputs.rt_url }}
          RT_USER: ${{ steps.creds.outputs.rt_user }}
          RT_KEY: ${{ steps.creds.outputs.rt_key }}
        run: |
          jf config add rt-server \
            --url="$RT_URL" \
            --user="$RT_USER" \
            --apikey="$RT_KEY" \
            --interactive=false

          SRC="${{ steps.repos.outputs.source }}"
          TGT="${{ steps.repos.outputs.target }}"
          IMG="${{ inputs.image_name }}"
          TAG="${{ inputs.image_tag }}"

          echo "Promoting: ${SRC}/${IMG}:${TAG} → ${TGT}/${IMG}:${TAG}"

          # Copy (not move) the Docker image between repos in Artifactory
          jf rt docker-promote "$IMG" "$SRC" "$TGT" \
            --server-id=rt-server \
            --source-tag="$TAG" \
            --target-tag="$TAG" \
            --copy

          echo "✓ Promoted ${IMG}:${TAG} from ${SRC} → ${TGT}"
