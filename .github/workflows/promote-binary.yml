name: Promote Binary Artifact

on:
  workflow_dispatch:
    inputs:
      secret_provider:
        description: "Secret provider"
        required: true
        type: choice
        options:
          - conjur
          - azure
          - inputs
        default: conjur
      artifactory_url:
        description: "Artifactory URL (if using inputs)"
        required: false
      artifactory_user:
        description: "Artifactory user (if using inputs)"
        required: false
      artifactory_key:
        description: "Artifactory API key (if using inputs)"
        required: false
      promotion:
        description: "Promotion stage"
        required: true
        type: choice
        options:
          - dev-to-uat
          - uat-to-prod
      source_repo:
        description: "Source Artifactory repo (auto-set from promotion stage)"
        required: false
      target_repo:
        description: "Target Artifactory repo (auto-set from promotion stage)"
        required: false
      artifact_path:
        description: "Artifact path within the repository"
        required: true
        default: "orchestras/"
      artifact_version:
        description: "Artifact version to promote"
        required: true

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      CONJUR_API_KEY: ${{ secrets.CONJUR_API_KEY }}
      CONJUR_URL: ${{ vars.CONJUR_URL }}
      CONJUR_SAFE: ${{ vars.CONJUR_SAFE }}
      AZURE_KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT_NAME }}
      SECRET_PROVIDER: ${{ inputs.secret_provider }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate promotion path
        id: repos
        run: |
          case "${{ inputs.promotion }}" in
            dev-to-uat)
              SRC="${{ inputs.source_repo }}"
              TGT="${{ inputs.target_repo }}"
              SRC="${SRC:-deno-binaries-dev}"
              TGT="${TGT:-deno-binaries-uat}"
              ;;
            uat-to-prod)
              SRC="${{ inputs.source_repo }}"
              TGT="${{ inputs.target_repo }}"
              SRC="${SRC:-deno-binaries-uat}"
              TGT="${TGT:-deno-binaries-prod}"
              ;;
            *)
              echo "::error::Invalid promotion: ${{ inputs.promotion }}. Must be dev-to-uat or uat-to-prod."
              exit 1
              ;;
          esac
          echo "source=$SRC" >> "$GITHUB_OUTPUT"
          echo "target=$TGT" >> "$GITHUB_OUTPUT"
          echo "Promoting: $SRC → $TGT"

      - name: Resolve Artifactory Credentials
        id: creds
        run: |
          source ./scripts/resolve_secrets.sh

          RT_URL="" RT_USER="" RT_KEY=""

          case "$SECRET_PROVIDER" in
            conjur)
              RT_URL=$(resolve_single_secret "artifactory/url" conjur) || true
              RT_USER=$(resolve_single_secret "artifactory/user" conjur) || true
              RT_KEY=$(resolve_single_secret "artifactory/api_key" conjur) || true
              ;;
            azure)
              RT_URL=$(resolve_single_secret "artifactory-url" azure) || true
              RT_USER=$(resolve_single_secret "artifactory-user" azure) || true
              RT_KEY=$(resolve_single_secret "artifactory-api-key" azure) || true
              ;;
          esac

          RT_URL="${RT_URL:-${{ inputs.artifactory_url }}}"
          RT_USER="${RT_USER:-${{ inputs.artifactory_user }}}"
          RT_KEY="${RT_KEY:-${{ inputs.artifactory_key }}}"

          if [ -z "$RT_URL" ] || [ -z "$RT_USER" ] || [ -z "$RT_KEY" ]; then
            echo "::error::Failed to resolve Artifactory credentials"
            exit 1
          fi

          echo "rt_url=$RT_URL" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$RT_USER"
          echo "::add-mask::$RT_KEY"
          echo "rt_user=$RT_USER" >> "$GITHUB_OUTPUT"
          echo "rt_key=$RT_KEY" >> "$GITHUB_OUTPUT"

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      - name: Copy Artifact (promote)
        env:
          RT_URL: ${{ steps.creds.outputs.rt_url }}
          RT_USER: ${{ steps.creds.outputs.rt_user }}
          RT_KEY: ${{ steps.creds.outputs.rt_key }}
        run: |
          jf config add rt-server \
            --url="$RT_URL" \
            --user="$RT_USER" \
            --apikey="$RT_KEY" \
            --interactive=false

          SRC="${{ steps.repos.outputs.source }}"
          TGT="${{ steps.repos.outputs.target }}"
          ARTIFACT="${{ inputs.artifact_path }}${{ inputs.artifact_version }}/"

          # Copy (not move) from source to target
          jf rt copy \
            "${SRC}/${ARTIFACT}*" \
            "${TGT}/${ARTIFACT}" \
            --server-id=rt-server \
            --flat=false

          echo "✓ Copied ${SRC}/${ARTIFACT} → ${TGT}/${ARTIFACT}"
